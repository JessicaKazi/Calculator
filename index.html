<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div id="calculator">
        <input id="calculatorScreen" readonly>
        <div id="buttons">
            <button onclick="displayScreen('√')">√</button>
            <button onclick="displayScreen('M-')">M-</button>
            <button onclick="displayScreen('M+')">M+</button>
            <button onclick="clearSum('C')" class="operator-btn">C</button>
            <button onclick="displayScreen('7')">7</button>
            <button onclick="displayScreen('8')">8</button>
            <button onclick="displayScreen('9')">9</button>
            <button onclick="displayScreen('*')" class="operator-btn">*</button>
            <button onclick="displayScreen('5')">5</button>
            <button onclick="displayScreen('4')">4</button>
            <button onclick="displayScreen('6')">6</button>
            <button onclick="displayScreen('/')" class="operator-btn">/</button>
            <button onclick="displayScreen('1')">1</button>
            <button onclick="displayScreen('2')">2</button>
            <button onclick="displayScreen('3')">3</button>
            <button onclick="displayScreen('-')" class="operator-btn">-</button>
            <button onclick="displayScreen('0')">0</button>
            <button onclick="displayScreen('.')" class="dot">.</button>
            <button onclick="equalCal('=')">=</button>
            <button onclick="displayScreen('+')" class="operator-btn">+</button>
        </div>
    </div>

    <script src="button.js"></script>
</body>
</html>
